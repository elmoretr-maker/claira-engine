<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020203" />
    <link rel="icon" href="/claira-engine-logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <title>Claira Engine</title>
    <script>
      try {
        var k = "claira_ui_theme";
        var t = localStorage.getItem(k);
        if (t !== "standard" && t !== "cinematic") t = "cinematic";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "cinematic");
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div
        id="claira-boot-plaque"
        style="
          min-height: 100vh;
          margin: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0a0c10;
          color: #c5cad6;
          font-family: system-ui, -apple-system, sans-serif;
          font-size: 0.9rem;
          padding: 1.5rem;
          text-align: center;
          box-sizing: border-box;
        "
      >
        Loading Claira Engine…
      </div>
    </div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
